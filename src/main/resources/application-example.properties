# ===============================
# CONFIGURACIÓN GENERAL
# ===============================
spring.application.name=backend
server.port=3000
server.address=0.0.0.0
server.servlet.session.timeout=99999999

# ===============================
# BASE DE DATOS (EJEMPLO)
# ===============================
# Reemplazar con valores reales en application.properties
spring.datasource.url=jdbc:postgresql://<HOST>:<PUERTO>/<NOMBRE_BD>
spring.datasource.username=<USUARIO>
spring.datasource.password=<PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.types.print.banner=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# JACKSON
# ===============================
spring.jackson.default-property-inclusion=always

# ===============================
# MVC
# ===============================
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=mappings

# ===============================
# ERRORES
# ===============================
server.error.include-message=always